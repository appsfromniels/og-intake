<title>Ontruimend Goed — Intake</title>
<style>
:root {
  --g900: #0d3836;
  --g800: #1a5552;
  --g700: #22706d;
  --g600: #2d8986;
  --g500: #3aada9;
  --g400: #56bdb8;
  --g200: #a8e2df;
  --g100: #d4f1ef;
  --g50:  #edf9f9;
  --bg:   #f4f8f8;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --muted:#5A6660;
  --border:#deecea;
  --r: 14px;
  --rs: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;color:var(--text);font-size:16px}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* HEADER */
.header{background:#fff;color:var(--text);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top,0px) + 12px) 0 0;flex-shrink:0}.header-inner{max-width:480px;margin:0 auto;padding:0 16px}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.header-left{display:flex;flex-direction:column;gap:3px}
.header-sub{font-size:11px;font-weight:500;color:var(--muted)}
.header-right{display:flex;gap:6px}


.hdr-btn svg{width:13px;height:13px;flex-shrink:0}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--border);padding:0 0 0;border-bottom:none;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px 12px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;position:relative;transition:color 0.15s;white-space:nowrap;border:none;background:none}
.tab.active{color:var(--g400)}
.tab.active::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2.5px;background:var(--g400);border-radius:2px}
.tab.done{color:var(--g400)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 100px}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-header{padding:13px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-icon{width:28px;height:28px;background:var(--g50);border-radius:8px;display:flex;align-items:center;justify-content:center}
.card-icon svg{width:15px;height:15px;stroke:var(--g700);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-title{font-size:13px;font-weight:600;color:var(--g600);text-transform:uppercase;letter-spacing:0.07em}
.card-body{padding:14px 16px}

/* FORM ELEMENTS */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;font-size:15px;background:#FAFBFA;
  border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);
  outline:none;transition:border-color 0.15s;-webkit-appearance:none;appearance:none;
  font-family:inherit
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g500);background:#fff}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* CHIPS */
.chip-group{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 14px;border:1.5px solid var(--border);border-radius:30px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;background:var(--card);transition:all 0.15s;user-select:none}
.chip.active{background:var(--g400);color:#fff;border-color:var(--g400)}
.chip.multi.active{background:var(--g100);color:var(--g800);border-color:var(--g500)}

/* TOGGLE ROWS */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:14px;color:var(--text);flex:1;padding-right:12px;line-height:1.3}
.toggle-wrap{display:flex;gap:6px;flex-shrink:0}
.tog{padding:6px 13px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);transition:all 0.12s}
.tog.ja{background:var(--g400);color:#fff;border-color:var(--g400)}
.tog.nee{background:#FFF0F0;color:#C0392B;border-color:#F5C6C6}

/* CHECKLIST */
.check-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}

let S = emptyState();

/* ---- STORAGE ---- */
function getIndex(){
  try { return JSON.parse(localStorage.getItem('og_index')||'[]'); } catch(e){ return []; }
}
function saveIntakeToStorage(){
  if(!APP.id) return;
  try {
    localStorage.setItem('og_intake_'+APP.id, JSON.stringify(S));
    const naam = S.klant.naam || 'Naamloos';
    const idx = getIndex();
    const statusBadge = (s) => {
      const st = STATUSES[s||'nieuw']||STATUSES.nieuw;
      return `<span class="status-badge" style="background:${st.bg};color:${st.color}">${st.label}</span>`;
    };
    const entry = { id:APP.id, naam, adres:S.klant.adres||'', datum:S.logistiek.uitvoerdatum||S.klant.datumOfferte||'', modified:Date.now(), status:S.status||'nieuw', factuurMeta:S.factuurMeta||null };
    const i = idx.findIndex(e=>e.id===APP.id);
    if(i>=0) idx[i]=entry; else idx.unshift(entry);
    localStorage.setItem('og_index', JSON.stringify(idx));
    showSaveDot();
  } catch(e){}
}
function loadIntakeFromStorage(id){
  try { return JSON.parse(localStorage.getItem('og_intake_'+id)||'null'); } catch(e){ return null; }
}
function deleteIntakeFromStorage(id){
  localStorage.removeItem('og_intake_'+id);
  const idx = getIndex().filter(e=>e.id!==id);
  localStorage.setItem('og_index', JSON.stringify(idx));
}

/* ---- AUTOSAVE ---- */
let saveTimer = null;
function scheduleAutoSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ saveIntakeToStorage(); schedulePdfCache(); }, 1200);
}
function showSaveDot(){
  const d = document.getElementById('save-dot');
  if(d){ d.classList.add('visible'); setTimeout(()=>d.classList.remove('visible'), 2000); }
}

/* ---- NAVIGATION ---- */
function goHome(){
  saveIntakeToStorage();
  APP.view = 'home';
  APP.id = null;
  S = emptyState();
  refresh();
}
function newIntake(){
  S = emptyState();
  S.klant.datumOfferte = new Date().toISOString().slice(0,10);
  APP.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  APP.view = 'form';
  refresh();
  preloadJsPDF();
}
function openIntake(id){
  const data = loadIntakeFromStorage(id);
  if(!data) return;
  S = Object.assign(emptyState(), data);
  S.tab = 0;
  APP.id = id;
  APP.view = 'form';
  refresh();
  preloadJsPDF();
}
function confirmDelete(id, e){
  e.stopPropagation();
  APP.pendingDelete = id;
  const idx = getIndex();
  const item = idx.find(i=>i.id===id);
  document.getElementById('confirm-msg').textContent = item ? 'Intake van ' + item.naam + ' definitief verwijderen?' : 'Weet je zeker dat je deze intake wil verwijderen?';
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('open'); }
function confirmOk(){
  if(APP.pendingDelete) deleteIntakeFromStorage(APP.pendingDelete);
  closeConfirm();
  refresh();
}

/* ---- RENDER HOME ---- */
function fmtDate(d){
  if(!d) return '';
  try{
    const [y,m,day] = d.split('-');
    return day+'-'+m+'-'+y;
  }catch{return d;}
}
function initials(naam){
  return naam.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function renderHome(){
  const idx = getIndex();
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
  const list = idx.length === 0

        <button onclick="confirmDelete('${item.id}',event)" style="background:none;border:none;padding:8px 6px;cursor:pointer;color:var(--muted);flex-shrink:0">

      </div>`;
      }).join('');

  document.getElementById('main-content').innerHTML = `

          <span class="home-title">BedrijfsApp</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin:16px 16px 8px">

function fmt(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function calcTotalen(){
  const k=S.kosten, l=S.logistiek;
  const pers=fmt(l.personen)*fmt(l.uren)*fmt(l.dagen)*39.5;
  const bus=fmt(k.busUren)*25, lift=fmt(k.liftUren)*100;
  const onth=fmt(k.ontheffing);
  const afvl=fmt(k.afvalKg)*0.25, min=fmt(k.mindering);
  const sub=pers+bus+lift+onth+afvl-min;
  return {pers,bus,lift,onth,afvl,min,sub,btw:sub*0.21,tot:sub*1.21};
}
function eu(n){ return '\u20ac\u00A0'+n.toFixed(2).replace('.',','); }

function calcUren(p){
  if(!p.begin||!p.eind) return null;
  const [bh,bm]=p.begin.split(':').map(Number);
  const [eh,em]=p.eind.split(':').map(Number);
  const m=(eh*60+em)-(bh*60+bm)-fmt(p.pauze||0);
  return m>0?(m/60):null;
}

function bindInputs(){
  const binds = [
    ['k-naam','klant.naam'],['k-adres','klant.adres'],['k-etage','klant.etage'],
    ['k-tel','klant.telefoon'],['k-email','klant.email'],['k-datum','klant.datumOfferte'],
    ['k-opl','klant.opleverdatum'],['k-door','klant.door'],
    ['l-uitv','logistiek.uitvoerdatum'],['l-reden','logistiek.reden'],
    ['l-pers','logistiek.personen'],['l-dag','logistiek.dagen'],['l-uur','logistiek.uren'],
    ['l-kratten','logistiek.kratten'],['l-m3h','logistiek.m3handel'],
    ['l-m3g','logistiek.m3grofvuil'],['l-kost','logistiek.kosten'],
    ['vl-dag','verhuislift.dag'],['vl-uur','verhuislift.uur'],
    ['gv-dag','grofvuil.dag'],['notities','notities']
  ];
  binds.forEach(([id,path])=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.addEventListener('input',()=>{
      const parts=path.split('.');
      if(parts.length===1) S[parts[0]]=el.value;
      else S[parts[0]][parts[1]]=el.value;
    });
  });
}


/* ---- MAIN RENDER ---- */
function refresh(){
  if(APP.view === 'home'){
    renderHome();
  } else if(APP.view === 'planning'){
    renderPlanning();
  } else if(APP.view === 'facturen'){
    renderFacturen();
  } else {
    renderFormHeader();
    document.getElementById('bottom-nav').style.display = '';
    const content = document.getElementById('main-content');
    if(S.tab===0) content.innerHTML=renderKlant();
    else if(S.tab===1) content.innerHTML=renderOpdracht();
    else if(S.tab===2) content.innerHTML=renderKlus();
    else if(S.tab===3) content.innerHTML=renderKosten();
    else if(S.tab===4) content.innerHTML=renderOverzicht();
    bindInputs();
  }
}

function renderNav(){
  const tabs = document.getElementById('tabs-nav');
  const bnav = document.getElementById('bottom-nav');
  if(tabs) tabs.innerHTML = TABS.map((t,i)=>`<div class="tab${S.tab===i?' active':''}" onclick="goTab(${i})">${t.label}</div>`).join('');
  if(bnav) bnav.innerHTML = TABS.map((t,i)=>`<button class="nav-item${S.tab===i?' active':''}" onclick="goTab(${i})">
    <div class="nav-icon">${icon(t.icon)}</div>
    <span class="nav-label">${t.label}</span>
  </button>`).join('');
}

function goTab(i){ S.tab=i; refresh(); document.querySelector('.content').scrollTop=0; }

function toggleArr(path, val){
  const parts=path.split('.');
  let arr = parts.length===1?S[parts[0]]:S[parts[0]][parts[1]];
  const idx=arr.indexOf(val);
  if(idx>=0) arr.splice(idx,1); else arr.push(val);
  refresh();
  scheduleAutoSave();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function onWaardeInput(val){
  S.logistiek.waarde = val;
  if(S.kosten.minder_auto !== false){
    S.kosten.mindering = ((parseFloat(val)||0)*0.25).toFixed(2);
    const m = document.getElementById('k-min');
    if(m) m.value = S.kosten.mindering;
  }
  updateTotals();
  scheduleAutoSave();
}

function addFotos(input){
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      if(!S.fotos) S.fotos = [];
      S.fotos.push(e.target.result);
      loaded++;
      if(loaded === files.length){ refresh(); scheduleAutoSave(); }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function deleteFoto(i){
  S.fotos.splice(i, 1);
  refresh();
  scheduleAutoSave();
}

async function generatePDFBlob(){
  if(!window.jspdf){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W = 210, pad = 22;
  const col1 = pad, col2 = 82, colR = W - pad;
  const teal = [86,189,184], dark = [26,26,26], muted = [120,120,120], light = [245,245,245];

  const k=S.klant, t=S.type, l=S.logistiek, T=calcTotalen();
  const yn = v => v===true?'Ja':v===false?'Nee':'—';
  const ef = n => eu(n);
  const fmtD = d => { if(!d) return '—'; const [y,m,day]=d.split('-'); return `${day}-${m}-${y}`; };
  const takenJa = TAKEN_LIST.filter(([k])=>S.taken[k]===true).map(([,lbl])=>lbl);
  const takenNee = TAKEN_LIST.filter(([k])=>S.taken[k]===false).map(([,lbl])=>lbl);

  let y = 0;

  // ── HEADER ──
  // Logo (left)
  doc.addImage(LOGO_SRC, 'PNG', pad, 14, 52, 19);

  // "BedrijfsApp" next to logo
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(...muted);
  doc.text('BedrijfsApp', pad+57, 26);

  // Date top right
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(...muted);
  const today = new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
  doc.text(today, colR, 17, {align:'right'});
  if(l.uitvoerdatum){
    doc.text('Uitvoer: '+fmtD(l.uitvoerdatum), colR, 23, {align:'right'});
  }

  // Thin divider line under header
  doc.setDrawColor(220,220,220);
  doc.line(pad, 37, colR, 37);

  y = 46;

  // ── SECTION helper ──
  function section(title){
    doc.setFillColor(86,189,184,0.12);
    doc.setFillColor(236,250,249);
    doc.rect(pad, y-4, W-2*pad, 7, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(7.5);
    doc.setTextColor(...teal);
    doc.text(title.toUpperCase(), pad+2, y+0.5);
    y += 7;
  }

  // ── ROW helper ──
  function row(label, value, bold=false){
    if(!value || value==='—') return;
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(...muted);
    doc.text(label, col1, y);
    doc.setTextColor(...dark);
    if(bold) doc.setFont('helvetica','bold');
    const lines = doc.splitTextToSize(String(value), colR-col2-2);
    doc.text(lines, col2, y);
    doc.setFont('helvetica','normal');
    y += lines.length * 5.5;
    if(y > 278){ doc.addPage(); y = 22; }
  }

  function divider(){ doc.setDrawColor(230,230,230); doc.line(pad, y, colR, y); y+=4; }

  // ── KLANTGEGEVENS ──
  section('Klantgegevens');
  row('Naam', k.naam);
  row('Adres', k.adres+(k.etage?' ('+k.etage+')':''));
  row('Telefoon', k.telefoon);
  row('E-mail', k.email);
  row('Datum offerte', fmtD(k.datumOfferte));
  row('Opleverdatum', fmtD(k.opleverdatum));
  row('Offerte door', k.door);
  y += 3;

  // ── OPDRACHT ──
  section('Opdracht');
  row('Woningtype', t.woning);
  row('Klanttype', t.klant);
  row('Extra ruimtes', t.extra.join(', ')||null);
  row('Schoonmaak', t.schoonmaak);
  row('Reden ontruiming', l.reden);
  row('Uitvoerdatum', fmtD(l.uitvoerdatum));
  if(l.personen||l.uren||l.dagen)
    row('Personeel', `${l.personen||'?'} personen × ${l.uren||'?'} uur × ${l.dagen||'?'} dagen`);
  if(l.m3handel) row('Volume handel', l.m3handel+' m³');
  if(l.m3grofvuil) row('Volume grofvuil', l.m3grofvuil+' m³');
  y += 3;

  // ── DETAILS KLUS ──
  section('Details klus');
  if(takenJa.length) row('Ja', takenJa.join(', '));
  if(takenNee.length) row('Nee', takenNee.join(', '));
  row('Verhuislift', yn(S.verhuislift.gebruik)+(S.verhuislift.gebruik&&S.verhuislift.dag?' ('+fmtD(S.verhuislift.dag)+')':''));
  row('Ontheffing', S.verhuislift.gebruik?yn(S.verhuislift.ontheffing):null);
  row('Grofvuil op straat', yn(S.grofvuil.straat)+(S.grofvuil.straat&&S.grofvuil.dag?' ('+fmtD(S.grofvuil.dag)+')':''));
  row('Klant rijdt mee', yn(S.grofvuil.klantrijdt));
  if(S.meenemen.length) row('Mee te nemen', S.meenemen.join(', '));
  if(S.notities) row('Notities', S.notities);
  y += 3;

  // ── FINANCIEEL ──
  section('Financieel');
  row('Personeelskosten', ef(T.pers));
  if(T.bus>0)  row('Bus', ef(T.bus));
  if(T.lift>0) row('Verhuislift', ef(T.lift));
  if(T.onth>0) row('Ontheffing', ef(T.onth));
  if(T.afvl>0) row('Afval', ef(T.afvl));
  if(T.min>0)  row('25% mindering inboedel', '-'+ef(T.min));
  divider();
  row('Subtotaal', ef(T.sub));
  row('BTW 21%', ef(T.btw));
  y += 1;

  // Total box
  doc.setFillColor(...teal);
  doc.roundedRect(pad, y, W-2*pad, 14, 3, 3, 'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(210,240,240);
  doc.text('Totaalprijs', pad+5, y+6);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(255,255,255);
  doc.text(ef(T.tot), colR-3, y+9, {align:'right'});
  y += 20;

  row('Betaalwijze', S.betaling.methode);
  row('Status', S.betaling.voldaan?'Voldaan':'Openstaand');

  // ── FOOTER ──
  const pages = doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal');
    doc.setFontSize(7.5);
    doc.setTextColor(180,180,180);
    doc.text('Ontruimend Goed — BedrijfsApp', pad, 287);
    doc.text(`${i}/${pages}`, colR, 287, {align:'right'});
  }

  // ── SHARE ──
  const naam = (k.naam||'intake').replace(/[^a-z0-9]/gi,'_');
  const datum = l.uitvoerdatum||new Date().toISOString().slice(0,10);
  const filename = `OG_${naam}_${datum}.pdf`;

  const pdfBlob = doc.output('blob');
  return doc.output('blob');
}

async function printPDF(){
  showToast('PDF aanmaken...');
  const pdfBlob = await generatePDFBlob();
  if(!pdfBlob) return;
  const naam = (S.klant.naam||'intake').replace(/[^a-z0-9]/gi,'_');
  const datum = S.logistiek.uitvoerdatum||new Date().toISOString().slice(0,10);
  const filename = 'OG_'+naam+'_'+datum+'.pdf';
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); document.body.removeChild(a); },1000);
  showToast('PDF opgeslagen');
}

function openPrintSheet(){ document.getElementById('print-sheet').classList.add('open'); }
function closePrintSheet(){ document.getElementById('print-sheet').classList.remove('open'); }

let _cachedPdfBlob = null;
let _cachedOffertePdfBlob = null;
let _cachedFactuurPdfBlob = null;
let _pdfTimer = null;

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

function preloadJsPDF(){
  const loads = [];
  if(!window.jspdf) loads.push(loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'));
  if(!window.QRCode) loads.push(loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'));
  if(loads.length>0){
    Promise.all(loads).then(()=>schedulePdfCache());
  } else {
    schedulePdfCache();
  }
}

function schedulePdfCache(){
  clearTimeout(_pdfTimer);
  _pdfTimer = setTimeout(async () => {
    try { _cachedPdfBlob = await generatePDFBlob(); } catch(e) { _cachedPdfBlob = null; }
    try { _cachedOffertePdfBlob = await generateOffertePDF(true); } catch(e) { _cachedOffertePdfBlob = null; }
    try { _cachedFactuurPdfBlob = await generateFactuurPDF(true); } catch(e) { _cachedFactuurPdfBlob = null; }
  }, 800);
}


/* ---- FACTUUR ---- */
function getNextFactuurNummer(){
  const year = new Date().getFullYear();
  const key = 'og_factuur_nr_'+year;
  const n = parseInt(localStorage.getItem(key)||'0') + 1;
  localStorage.setItem(key, n);
  return year+'/'+String(n).padStart(4,'0');
}

function calcFactuurTotals(){
  const k = S.kosten;
  const subtotaalExBtw = (S.factuur.regels||[]).reduce((s,r)=>s+fmt(r.bedrag),0);
  const btw = subtotaalExBtw*0.21;
  const verrekening = fmt(k.mindering);
  const totaal = subtotaalExBtw+btw-verrekening;
  return {subtotaalExBtw,btw,verrekening,totaal};
}

function resetFactuurRegels(){
  S.factuur.regels = buildVasteRegels();
  refresh(); scheduleAutoSave();
  showToast('Regels hersteld vanuit intake');
}
function addFactuurRegel(){
  if(!S.factuur.regels) S.factuur.regels=[];
  S.factuur.regels.push({omschrijving:'',bedrag:''});
  refresh(); scheduleAutoSave();
}
function deleteFactuurRegel(i){
  S.factuur.regels.splice(i,1);
  refresh(); scheduleAutoSave();
}

function copyBetaalgegevens(){
  const T = calcFactuurTotals();
  const f = S.factuur;
  const lines = [
    'Betaalgegevens Ontruimend Goed',
    'IBAN: '+BEDRIJF.iban,
    'Bedrag: \u20ac '+T.totaal.toFixed(2).replace('.',','),
    'Omschrijving: Factuur '+(f.nummer||''),
    'Bank: '+BEDRIJF.bank,
  ];
  navigator.clipboard?.writeText(lines.join('\n'))
    .then(()=>showToast('Betaalgegevens gekopieerd \u2713'))
    .catch(()=>showToast('Kopi\u00ebren niet beschikbaar'));
}

function buildVasteRegels(){
  const k=S.kosten, l=S.logistiek;
  const pers = fmt(l.personen)*fmt(l.uren)*fmt(l.dagen)*39.5;
  const bus  = fmt(k.busUren)*25;
  const lift = fmt(k.liftUren)*100;
  const onth = fmt(k.ontheffing);
  return [
    pers>0  && {omschrijving:'Personeelskosten ('+l.personen+' pers × '+l.uren+' uur × '+l.dagen+' dagen)', bedrag:String(pers)},
    bus>0   && {omschrijving:'Bus', bedrag:String(bus)},
    lift>0  && {omschrijving:'Verhuislift', bedrag:String(lift)},
    onth>0  && {omschrijving:'Ontheffing/parkeerplekken', bedrag:String(onth)},
  ].filter(Boolean);
}

function initFactuurIfEmpty(){
  const f = S.factuur;
  if(!f.nummer) f.nummer = getNextFactuurNummer();
  if(!f.datum)  f.datum  = new Date().toISOString().slice(0,10);
  if(!f.projectnaam && S.klant.adres) f.projectnaam = S.klant.adres;
  if(!f.aanhef && S.klant.naam) f.aanhef = 't.a.v. '+S.klant.naam;
  // Pre-populate regels from intake if not yet done
  if(!f.regels || f.regels.length===0){
    f.regels = buildVasteRegels();
  }
  // Remove asbesttest if present from old data
  f.regels = f.regels.filter(r => !r.omschrijving.toLowerCase().includes('asbest'));
}

function renderFactuur(){
  initFactuurIfEmpty();
  const f = S.factuur, k = S.kosten, l = S.logistiek;
  const T = calcFactuurTotals();
  const ef = n => n>0 ? '\u20ac\u00a0'+n.toFixed(2).replace('.',',') : '';

    T.pers>0  && {omschrijving:'Personeelskosten ('+l.personen+' pers \u00d7 '+l.uren+' uur \u00d7 '+l.dagen+' dagen)', bedrag:T.pers},
    T.bus>0   && {omschrijving:'Bus', bedrag:T.bus},
    T.lift>0  && {omschrijving:'Verhuislift', bedrag:T.lift},
    T.onth>0  && {omschrijving:'Ontheffing/parkeerplekken', bedrag:T.onth},
  ].filter(Boolean);

  return `
  <div class="card">
    ${cardH('receipt','Factuurgegevens')}
    <div class="card-body">
      <div class="grid2">
        ${fieldEl('Factuurnummer', '<input id="f-nr" value="'+esc(f.nummer)+'" placeholder="2026/0001" onblur="S.factuur.nummer=this.value;scheduleAutoSave()">')}
        ${fieldEl('Factuurdatum', '<input id="f-datum" type="date" value="'+esc(f.datum)+'" onblur="S.factuur.datum=this.value;scheduleAutoSave()">')}

      <div class="factuur-totaal">

function validateForDocument(){
  const k=S.klant, l=S.logistiek;
  const missing=[];
  if(!k.naam) missing.push('Klantnaam');
  if(!k.adres) missing.push('Adres');
  if(!l.personen&&!l.uren&&!l.dagen) missing.push('Personeelsgegevens (tabje Kosten)');
  if(missing.length>0){
    showToast('Vul eerst in: '+missing.join(', '));
    return false;
  }
  return true;
}

async function generateOffertePDF(blobOnly=false){
  if(!blobOnly){ showToast('Offerte aanmaken...'); await new Promise(r=>setTimeout(r,0)); }

  if(!window.jspdf || !window.QRCode){
    await Promise.all([
      !window.jspdf  ? loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js') : Promise.resolve(),
      !window.QRCode ? loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js') : Promise.resolve(),
    ]);
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const W=210, pad=22, colR=W-pad;
  const k=S.klant, t=S.type, l=S.logistiek;
  const T = calcTotalen();
  const teal=[86,189,184], dark=[26,26,26], muted=[120,120,120];
  const ef = n => '\u20ac '+n.toFixed(2).replace('.',',');
  const fmtD = d => { if(!d) return ''; const [y,m,day]=d.split('-'); return day+'-'+m+'-'+y; };
  const today = new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});

  // ── LOGO ──
  doc.addImage(LOGO_SRC,'PNG',pad,14,52,19);

  // ── BEDRIJFSGEGEVENS rechts ──
  const info = [
    ['Adres',BEDRIJF.adres],['',BEDRIJF.postcode],
    ['KvK nr',BEDRIJF.kvk],['BTW nr',BEDRIJF.btw],
    ['Bank',BEDRIJF.bank],['IBAN',BEDRIJF.iban],
    ['TEL',BEDRIJF.tel],['E-mail',BEDRIJF.email],
    ['Website',BEDRIJF.website],
  ];
  let iy=14;
  info.forEach(([lbl,val])=>{
    if(lbl){ doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...muted); doc.text(lbl, 118, iy, {align:'right'}); }
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...dark); doc.text(val, 121, iy); iy+=5;
  });

  // ── DATUM ──
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
  doc.text('Amsterdam, '+today+'.', pad, 44);

  // ── OFFERTE HEADER BLOCK ──
  let y=54;
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...dark);
  doc.text('OFFERTE', pad, y);
  doc.setFont('helvetica','normal');
  const offInfo = [
    k.naam ? 't.a.v. '+k.naam : '',
    k.adres ? 'Projectnaam: '+k.adres+(k.etage?' ('+k.etage+')':'') : '',
    'Projectbeschrijving: '+(t.woning||'Ontruiming'),
    l.uitvoerdatum ? 'Gewenste uitvoerdatum: '+fmtD(l.uitvoerdatum) : '',
  ].filter(Boolean);
  offInfo.forEach(line=>{ doc.text(line, 55, y); y+=5; });

  y+=8;

  // ── INTRO ──
  const intro = 'Geachte '+(k.naam||'heer/mevrouw')+', hierbij ontvangt u onze vrijblijvende offerte voor de ontruimingswerkzaamheden.';
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...dark);
  const introLines = doc.splitTextToSize(intro, colR-pad);
  doc.text(introLines, pad, y); y+=introLines.length*5+8;

  // ── TABEL HEADER ──
  doc.setFillColor(...teal);
  doc.rect(pad, y, colR-pad, 8, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
  doc.text('Beschrijving', pad+3, y+5.5);
  doc.text('Kosten', colR-3, y+5.5, {align:'right'});
  y+=8;

  // ── REGELS ──
  const regels = [
    (T.pers>0) && {omschrijving:'Personeelskosten ('+l.personen+' pers \u00d7 '+l.uren+' uur \u00d7 '+l.dagen+' dagen)', bedrag:T.pers},
    (T.bus>0)  && {omschrijving:'Bus', bedrag:T.bus},
    (T.lift>0) && {omschrijving:'Verhuislift', bedrag:T.lift},
    (T.onth>0) && {omschrijving:'Ontheffing/parkeerplekken', bedrag:T.onth},
    (T.afvl>0) && {omschrijving:'Afvalkosten', bedrag:T.afvl},
  ].filter(Boolean);

  regels.forEach((r,i)=>{
    doc.setDrawColor(210,210,210);
    doc.setFillColor(i%2===0?255:250,i%2===0?255:250,i%2===0?255:250);
    const lines=doc.splitTextToSize(r.omschrijving,colR-pad-40);
    const rh=Math.max(9,lines.length*5+4);
    doc.rect(pad,y,colR-pad,rh,'FD');
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
    doc.text(lines,pad+3,y+5);
    doc.text(ef(r.bedrag),colR-3,y+5,{align:'right'});
    y+=rh;
    if(y>255){doc.addPage();y=22;}
  });

  y+=4;

  // ── TOTALEN ──
  const totaalRows = [
    T.min>0 ? ['25% mindering inboedel','-'+ef(T.min)] : null,
    ['Subtotaal excl. BTW', ef(T.sub)],
    ['BTW 21%', ef(T.btw)],
    ['__bold__Totaal incl. BTW', ef(T.tot)],
  ].filter(Boolean);

  totaalRows.forEach(([lbl,val])=>{
    const bold=lbl.startsWith('__bold__');
    const cleanLbl=lbl.replace('__bold__','');
    doc.setDrawColor(210,210,210);
    doc.rect(pad,y,colR-pad,7,'D');
    doc.setFont('helvetica',bold?'bold':'normal');
    doc.setFontSize(9); doc.setTextColor(...dark);
    doc.text(cleanLbl,pad+3,y+4.8);
    doc.text(val,colR-3,y+4.8,{align:'right'});
    y+=7;
  });

  y+=12;

  // ── AANVULLENDE INFORMATIE ──
  if(S.offerteNotities && S.offerteNotities.trim() && y+20<270){
    y+=4;
    doc.setFillColor(236,250,249);
    const notLines = doc.splitTextToSize(S.offerteNotities.trim(), colR-pad-6);
    const notH = notLines.length*5+8;
    if(y+notH<272){
      doc.rect(pad, y, colR-pad, notH, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...teal);
      doc.text('Aanvullende informatie', pad+3, y+5);
      doc.setFont('helvetica','normal'); doc.setTextColor(...dark);
      notLines.forEach((line,i)=>{ doc.text(line, pad+3, y+10+(i*5)); });
      y += notH+6;
    }
  }

  // ── AFSLUITING ──
  const afsluiting = 'Wij hopen u hiermee een duidelijk beeld te hebben gegeven. Graag ontvangen wij uw akkoord.\n\nMet hartelijke groet,\nFrank van Haaren, Robin van de Water';
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
  afsluiting.split('\n').forEach(line=>{ if(y<278){doc.text(line,pad,y);y+=5;} });

  // ── FOOTER ──
  const pages=doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(180,180,180);
    doc.text('Ontruimend Goed \u2014 '+BEDRIJF.iban+' \u2014 '+BEDRIJF.email, W/2, 290, {align:'center'});
  }

  // ── DOWNLOAD/SHARE ──
  const naam=(k.naam||'offerte').replace(/[^a-z0-9]/gi,'_');
  const datum=l.uitvoerdatum||new Date().toISOString().slice(0,10);
  const filename='Offerte_'+naam+'_'+datum+'.pdf';
  const blob=doc.output('blob');
  if(blobOnly) return blob;
  const file=new File([blob],filename,{type:'application/pdf'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'Offerte '+k.naam}).catch(()=>{ downloadBlob(blob,filename); });
  } else {
    downloadBlob(blob,filename);
    showToast('Offerte opgeslagen');
  }
}

async function generateFactuurPDF(blobOnly=false){
  // Init factuur state if needed
  if(!S.factuur.nummer) S.factuur.nummer = getNextFactuurNummer();
  if(!S.factuur.datum) S.factuur.datum = new Date().toISOString().slice(0,10);
  if(!S.factuur.projectnaam && S.klant.adres) S.factuur.projectnaam = S.klant.adres;
  if(!S.factuur.aanhef && S.klant.naam) S.factuur.aanhef = 't.a.v. '+S.klant.naam;
  if(!S.factuur.regels||S.factuur.regels.length===0) S.factuur.regels=buildVasteRegels();
  S.factuur.regels=S.factuur.regels.filter(r=>!r.omschrijving.toLowerCase().includes('asbest'));
  // Store factuur metadata
  const _fT = calcFactuurTotals();
  S.factuurMeta = { nummer: S.factuur.nummer, datum: S.factuur.datum||new Date().toISOString().slice(0,10), bedrag: _fT.totaal, betaald: S.betaling.voldaan||false };
  scheduleAutoSave();
  if(!blobOnly){ showToast('Factuur aanmaken...'); await new Promise(r=>setTimeout(r,0)); }

  // Ensure libraries are loaded
  if(!window.jspdf || !window.QRCode){
    await Promise.all([
      !window.jspdf   ? loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js') : Promise.resolve(),
      !window.QRCode  ? loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js') : Promise.resolve(),
    ]);
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const W=210, pad=20, colR=W-pad;
  const f=S.factuur, k=S.klant;
  const T=calcFactuurTotals();
  const teal=[86,189,184], dark=[26,26,26], muted=[120,120,120];
  const ef = n => '\u20ac '+n.toFixed(2).replace('.',',');
  const fmtD = d => { if(!d) return ''; const [y,m,day]=d.split('-'); return day+'-'+m+'-'+y; };

  // ── LOGO ──
  doc.addImage(LOGO_SRC,'PNG',pad,14,48,17);

  // ── BEDRIJFSGEGEVENS (rechts) ──
  const info = [
    ['Adres', BEDRIJF.adres],
    ['', BEDRIJF.postcode],
    ['KvK nr', BEDRIJF.kvk],
    ['BTW nr', BEDRIJF.btw],
    ['Bank', BEDRIJF.bank],
    ['IBAN', BEDRIJF.iban],
    ['TEL', BEDRIJF.tel],
    ['E-mail', BEDRIJF.email],
    ['Website', BEDRIJF.website],
  ];
  let iy = 14;
  info.forEach(([lbl,val])=>{
    if(lbl){
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...muted);
      doc.text(lbl, 118, iy, {align:'right'});
    }
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...dark);
    doc.text(val, 121, iy);
    iy += 5;
  });

  // ── DATUM + STAD ──
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
  doc.text('Amsterdam, '+fmtD(f.datum||new Date().toISOString().slice(0,10))+'.', pad, 44);

  // ── FACTUUR HEADER BLOCK ──
  let y = 54;
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...dark);
  doc.text('FACTUUR', pad, y);
  doc.setFont('helvetica','normal');
  const factInfo = [
    f.aanhef,
    'Projectnaam: '+f.projectnaam,
    'Projectbeschrijving: '+f.projectbeschrijving,
    'Factuurnummer: '+f.nummer,
    'Betalingstermijn: '+(f.betalingstermijn||15)+' dagen',
  ].filter(Boolean);
  factInfo.forEach(line=>{ doc.text(line, 55, y); y+=5; });

  y += 8;

  // ── INTRO TEKST ──
  const intro = 'Geachte '+(k.naam||'');
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...dark);
  const introLines = doc.splitTextToSize(intro, colR-pad);
  doc.text(introLines, pad, y);
  y += introLines.length*5 + 8;

  // ── TABEL HEADER ──
  doc.setFillColor(...teal);
  doc.rect(pad, y, colR-pad, 8, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(255,255,255);
  doc.text('Beschrijving', pad+3, y+5.5);
  doc.text('Kosten', colR-3, y+5.5, {align:'right'});
  y += 8;

  // ── KOSTENREGELS ──
  const l = S.logistiek;
  const vaste = [
    T.pers>0  && {omschrijving:'Personeelskosten ('+l.personen+' pers \u00d7 '+l.uren+' uur \u00d7 '+l.dagen+' dagen)', bedrag:T.pers},
    T.bus>0   && {omschrijving:'Bus', bedrag:T.bus},
    T.lift>0  && {omschrijving:'Verhuislift', bedrag:T.lift},
    T.onth>0  && {omschrijving:'Ontheffing/parkeerplekken', bedrag:T.onth},
  ].filter(Boolean);
  const alleRegels = [...vaste, ...(f.regels||[]).filter(r=>r.omschrijving)];

  alleRegels.forEach((r,i)=>{
    const bedrag = r.bedrag||0;
    doc.setDrawColor(210,210,210);
    doc.setFillColor(i%2===0?255:250,i%2===0?255:250,i%2===0?255:250);
    const lines = doc.splitTextToSize(r.omschrijving, colR-pad-40);
    const rh = Math.max(9, lines.length*5+4);
    doc.rect(pad, y, colR-pad, rh, 'FD');
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
    doc.text(lines, pad+3, y+5);
    if(bedrag>0){
      doc.text(ef(fmt(bedrag)), colR-3, y+5, {align:'right'});
    }
    y += rh;
    if(y>250){doc.addPage();y=20;}
  });

  y += 4;

  // ── TOTALEN ──
  const totaalRows = [
    ['BTW 21%', ef(T.btw)],
    T.verrekening>0 ? ['Verrekening inboedel', '-'+ef(T.verrekening)] : null,
    ['__bold__Totaal incl. BTW', ef(T.totaal)],
  ].filter(Boolean);

  totaalRows.forEach(([lbl,val])=>{
    const bold = lbl.startsWith('__bold__');
    const cleanLbl = lbl.replace('__bold__','');
    doc.setDrawColor(210,210,210);
    doc.rect(pad, y, colR-pad, 7, 'D');
    doc.setFont('helvetica', bold?'bold':'normal');
    doc.setFontSize(9); doc.setTextColor(...dark);
    doc.text(cleanLbl, pad+3, y+4.8);
    doc.text(val, colR-3, y+4.8, {align:'right'});
    y += 7;
  });

  y += 12;

  // ── QR CODE (Girocode/EPC) ──
  const epcData = [
    'BCD','002','1','SCT',
    BEDRIJF.bic,
    BEDRIJF.naam,
    BEDRIJF.iban,
    'EUR'+T.totaal.toFixed(2),
    'CHAR','',
    'Factuur '+f.nummer
  ].join('\n');

  // Generate QR as data URL
  const qrDiv = document.createElement('div');
  qrDiv.style.cssText = 'position:fixed;left:-9999px;top:0';
  document.body.appendChild(qrDiv);
  new QRCode(qrDiv, {text:epcData, width:160, height:160, correctLevel:QRCode.CorrectLevel.M});

  // Wait for img to be fully rendered
  const qrDataUrl = await new Promise(res => {
    const check = () => {
      const img = qrDiv.querySelector('img');
      const cvs = qrDiv.querySelector('canvas');
      if(img && img.src && img.src.length > 100){
        res(img.src);
      } else if(cvs){
        res(cvs.toDataURL('image/png'));
      } else {
        setTimeout(check, 50);
      }
    };
    setTimeout(check, 100);
    setTimeout(()=>res(null), 2000); // fallback timeout
  });
  document.body.removeChild(qrDiv);

  // Payment section: QR (desktop) + betaalgegevens (mobile)
  if(y+42<270){
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...teal);
    doc.text('Betalen:', pad, y);
    y += 5;

    // QR left
    if(qrDataUrl){
      doc.addImage(qrDataUrl,'PNG',pad,y,28,28);
    }

    // Betaalgegevens right
    const rx = pad+32;
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...muted);
    doc.text('Scan QR met uw bankieren-app, of gebruik de gegevens hiernaast:', rx, y+4);
    const betaalInfo = [
      ['IBAN', BEDRIJF.iban],
      ['Bedrag', '€ '+T.totaal.toFixed(2).replace('.',',')],
      ['Omschrijving', 'Factuur '+(f.nummer||'')],
      ['Bank', BEDRIJF.bank],
    ];
    let by = y+9;
    betaalInfo.forEach(([lbl,val])=>{
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...muted);
      doc.text(lbl+':', rx, by);
      doc.setFont('helvetica','bold'); doc.setTextColor(...dark);
      doc.text(val, rx+28, by);
      by += 5;
    });
    y += 32;
  }

  // ── AFSLUITING ──
  if(f.afsluitingszin && y<260){
    y += 6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
    f.afsluitingszin.split('\n').forEach(line=>{ doc.text(line,pad,y); y+=5; });
  }

  // ── FOOTER ──
  const pages = doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(180,180,180);
    doc.text('Ontruimend Goed \u2014 '+BEDRIJF.iban+' \u2014 '+BEDRIJF.email, W/2, 290, {align:'center'});
  }

  // ── DOWNLOAD/SHARE ──
  const naam = (k.naam||'factuur').replace(/[^a-z0-9]/gi,'_');
  const filename = 'Factuur_'+f.nummer.replace('/','_')+'_'+naam+'.pdf';
  const blob = doc.output('blob');
  if(blobOnly) return blob;
  const file = new File([blob], filename, {type:'application/pdf'});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], title:'Factuur '+f.nummer}).catch(()=>{
      downloadBlob(blob,filename);
    });
  } else {
    downloadBlob(blob,filename);
    showToast('Factuur opgeslagen');
  }
}

// Show QR preview when rendering factuur tab
function renderQRPreview(){
  const container = document.getElementById('qr-container');
  if(!container) return;
  const T = calcFactuurTotals();

/* ---- SWIPE NAVIGATION ---- */
(function(){
  let startX = 0, startY = 0, moved = false;
  const content = document.getElementById('main-content');

  content.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, {passive: true});

  content.addEventListener('touchmove', e => {
    moved = true;
  }, {passive: true});

  content.addEventListener('touchend', e => {
    if(!moved) return;
    if(APP.view !== 'form') return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Only horizontal swipes (dx > dy to avoid scroll interference)
    if(Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    if(dx < 0 && S.tab < TABS.length - 1) goTab(S.tab + 1); // swipe left → next
    if(dx > 0 && S.tab > 0) goTab(S.tab - 1);               // swipe right → prev
  }, {passive: true});
})();

async function downloadFactuur(id, event){
  event.stopPropagation();
  // Load the intake
  const data = loadIntakeFromStorage(id);
  if(!data) return;
  // Temporarily swap state
  const prevS = JSON.parse(JSON.stringify(S));
  const prevId = APP.id;
  Object.assign(S, data);
  APP.id = id;
  // Generate factuur PDF
  showToast('Factuur aanmaken...');
  if(!window.jspdf||!window.QRCode){
    await Promise.all([
      !window.jspdf  ? loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js') : Promise.resolve(),
      !window.QRCode ? loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js') : Promise.resolve(),
    ]);
  }
  const blob = await generateFactuurPDF(true);
  // Restore state
  Object.assign(S, prevS);
  APP.id = prevId;
  if(!blob){ showToast('Mislukt'); return; }
  const naam = (data.klant?.naam||'factuur').replace(/[^a-z0-9]/gi,'_');
  const nr = (data.factuur?.nummer||'').replace('/','_');
  const filename = 'Factuur_'+nr+'_'+naam+'.pdf';
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
  showToast('Factuur gedownload');
}

function renderPlanning(){

  const withDate = idx.filter(i=>i.datum).sort((a,b)=>a.datum.localeCompare(b.datum));

  const MONTHS=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  const grouped={};
  withDate.forEach(item=>{
    const d=new Date(item.datum);

    grouped[key].push({...item,d});
  });
  const monthsHtml=Object.entries(grouped).map(([key,items])=>{

  }).join('');

async function sendEmail(type){
  const k=S.klant, l=S.logistiek, T=calcTotalen();
  const ef=n=>eu(n);
  const fmtD=d=>{ if(!d) return ''; const [y,m,day]=d.split('-'); return day+'-'+m+'-'+y; };
  const naam=k.naam||'heer/mevrouw';
  const adres=k.adres||'';
  const datum=fmtD(l.uitvoerdatum);
  const naamFile=(k.naam||'').replace(/[^a-z0-9]/gi,'_');
  const datumFile=l.uitvoerdatum||new Date().toISOString().slice(0,10);
  const emailAdres=k.email||'';

  let subject='', body='', blob=null, filename='';

  if(type==='offerte'){
    subject='Offerte ontruiming '+adres;
    body=['Geachte '+naam+',','','Bijgaand ontvangt u onze vrijblijvende offerte voor de ontruimingswerkzaamheden'+(adres?' aan '+adres:'')+(datum?' op '+datum:'')+'.','','Totaalbedrag: '+ef(T.tot)+' incl. BTW.','','Graag ontvangen wij uw akkoord.','','Met hartelijke groet,','Frank van Haaren, Robin van de Water','Ontruimend Goed',BEDRIJF.tel,BEDRIJF.email].join('\n');
    blob=_cachedOffertePdfBlob;
    filename='Offerte_'+naamFile+'_'+datumFile+'.pdf';

  } else if(type==='factuur'){
    if(!S.factuur.nummer) S.factuur.nummer=getNextFactuurNummer();
    if(!S.factuur.datum) S.factuur.datum=new Date().toISOString().slice(0,10);
    if(!S.factuur.projectnaam&&k.adres) S.factuur.projectnaam=k.adres;
    if(!S.factuur.aanhef&&k.naam) S.factuur.aanhef='t.a.v. '+k.naam;
    if(!S.factuur.regels||S.factuur.regels.length===0) S.factuur.regels=buildVasteRegels();
    S.factuur.regels=S.factuur.regels.filter(r=>!r.omschrijving.toLowerCase().includes('asbest'));
    const fT=calcFactuurTotals();
    S.factuurMeta={nummer:S.factuur.nummer,datum:S.factuur.datum,bedrag:fT.totaal,betaald:false};
    scheduleAutoSave();
    subject='Factuur ontruiming '+adres;
    body=['Geachte '+naam+',','','Bijgaand ontvangt u de factuur voor de ontruimingswerkzaamheden'+(adres?' aan '+adres:'')+(datum?' uitgevoerd op '+datum:'')+'.','','Factuurbedrag: '+ef(fT.totaal)+' incl. BTW.','IBAN: '+BEDRIJF.iban,'T.n.v.: '+BEDRIJF.naam,'','Gelieve binnen 15 dagen te betalen.','','Met hartelijke groet,','Frank van Haaren, Robin van de Water','Ontruimend Goed',BEDRIJF.tel,BEDRIJF.email].join('\n');
    blob=_cachedFactuurPdfBlob;
    filename='Factuur_'+(S.factuur.nummer||'').replace('/','_')+'_'+naamFile+'.pdf';

  } else if(type==='bevestiging'){
    subject='Bevestiging opdracht ontruiming '+adres;
    body=['Geachte '+naam+',','','Hierbij bevestigen wij de opdracht voor de ontruiming van'+(adres?' '+adres:'')+(datum?' op '+datum:'')+'.','','Wij komen op de afgesproken datum bij u langs.','','Met hartelijke groet,','Frank van Haaren, Robin van de Water','Ontruimend Goed',BEDRIJF.tel,BEDRIJF.email].join('\n');

  } else if(type==='herinnering'){
    subject='Betalingsherinnering factuur ontruiming '+adres;
    body=['Geachte '+naam+',','','Wij herinneren u vriendelijk aan de openstaande factuur'+(adres?' voor de ontruiming van '+adres:'')+'.','','Openstaand bedrag: '+ef(T.tot),'IBAN: '+BEDRIJF.iban,'T.n.v.: '+BEDRIJF.naam,'','Graag binnen 7 dagen overmaken.','','Met hartelijke groet,','Frank van Haaren, Robin van de Water','Ontruimend Goed',BEDRIJF.tel].join('\n');
  }

  // Copy email address to clipboard so user can paste in To: field
  if(emailAdres){
    navigator.clipboard?.writeText(emailAdres).catch(()=>{});
  }

  // For offerte/factuur: share PDF via native share sheet
  if(type==='offerte'||type==='factuur'){
    // Generate on demand if cache not ready
    if(!blob){
      showToast('PDF voorbereiden...');
      blob = type==='offerte' ? await generateOffertePDF(true) : await generateFactuurPDF(true);
    }
    if(blob){
      const file=new File([blob], filename, {type:'application/pdf'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try {
          await navigator.share({files:[file], title:subject, text:body});
          if(emailAdres) showEmailToast(emailAdres);
        } catch(e){
          if(e.name!=='AbortError'){
            shareAsFallback(blob, filename, emailAdres);
          }
        }
        return;
      }
    }
    shareAsFallback(blob, filename, emailAdres);
    return;
  }

  // Bevestiging/herinnering: mailto
  window.location.href=`mailto:${emailAdres}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function downloadBlob(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); document.body.removeChild(a);},1000);
}

function shareAsFallback(blob, filename, emailAdres){
  if(blob) downloadBlob(blob, filename);
  if(emailAdres) showEmailToast(emailAdres);
}

function showEmailToast(email){
  // Show sticky banner with email address to paste
  const existing=document.getElementById('email-banner');
  if(existing) existing.remove();
  const banner=document.createElement('div');
  banner.id='email-banner';
  banner.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);left:16px;right:16px;background:#1a1a1a;color:#fff;border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,0.3)';

  document.body.appendChild(banner);
  setTimeout(()=>{ if(banner.parentElement) banner.remove(); },8000);
}

function doShare(){
  const naam = (S.klant.naam||'intake').replace(/[^a-z0-9]/gi,'_');
  const datum = S.logistiek.uitvoerdatum||new Date().toISOString().slice(0,10);
  const filename = 'OG_'+naam+'_'+datum+'.pdf';
  const title = ('Intake '+(S.klant.naam||'')).trim();

  if(_cachedPdfBlob){
    const file = new File([_cachedPdfBlob], filename, {type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title}).catch(e=>{
        if(e.name!=='AbortError') fallbackShareText();
      });
      return;
    }
  }
  // No cached PDF or file sharing not supported — share as text
  fallbackShareText();
}

function fallbackShareText(){
  const k=S.klant, l=S.logistiek, T=calcTotalen();
  const ef = n => '\u20ac '+n.toFixed(2).replace('.',',');
  const fmtD = d => { if(!d) return '\u2014'; const [y,m,day]=d.split('-'); return day+'-'+m+'-'+y; };
  const takenJa = TAKEN_LIST.filter(([k])=>S.taken[k]===true).map(([,lbl])=>lbl);

  const text = [
    'ONTRUIMEND GOED \u2014 INTAKE',
    k.naam ? 'Klant: '+k.naam : '',
    k.adres ? 'Adres: '+k.adres+(k.etage?' ('+k.etage+')':'') : '',
    k.telefoon ? 'Tel: '+k.telefoon : '',
    l.uitvoerdatum ? 'Datum: '+fmtD(l.uitvoerdatum) : '',
    l.reden ? 'Reden: '+l.reden : '',
    (l.personen&&l.uren&&l.dagen) ? 'Personeel: '+l.personen+' pers \u00d7 '+l.uren+' uur \u00d7 '+l.dagen+' dagen' : '',
    takenJa.length ? 'Taken: '+takenJa.join(', ') : '',
    '',
    'TOTAAL: '+ef(T.tot),
    S.betaling.voldaan ? 'Status: Voldaan' : 'Status: Openstaand',
  ].filter(Boolean).join('\n');

  const title = ('Intake '+(k.naam||'')).trim();
  if(navigator.share){
    navigator.share({title, text}).catch(e=>{ if(e.name!=='AbortError') showToast('Delen niet beschikbaar'); });
  } else {
    navigator.clipboard?.writeText(text).then(()=>showToast('Gekopieerd')).catch(()=>showToast('Delen niet beschikbaar'));
  }
}

function updateTotals(){

    update('tot-btw',  eu(T.btw));
    update('tot-tot',  eu(T.tot));

}
/* ---- SERVICE WORKER (offline cache) ---- */
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='og-v4';
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET') return;
      e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(r=>{
        if(r) return r;
        return fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}).catch(()=>r);
      })));
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
